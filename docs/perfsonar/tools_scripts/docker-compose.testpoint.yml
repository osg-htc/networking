version: "3.9"
services:
  testpoint:
    container_name: perfsonar-testpoint
    image: hub.opensciencegrid.org/osg-htc/perfsonar-testpoint:production
    labels:
      - io.containers.autoupdate=registry
    network_mode: "host"
    privileged: true
    cgroupns: private
    environment:
      - TZ=UTC
    restart: unless-stopped
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    volumes:
      # D-Bus socket: needed by node_exporter --collector.systemd on systemd hosts
      - /run/dbus:/run/dbus:ro
      - /opt/perfsonar-tp/psconfig:/etc/perfsonar/psconfig:Z
      # Optional: uncomment and create this file if node_exporter crashes with
      # 'slice bounds out of range' (procfs v0.10.0 cpufreq bug on hosts with
      # offline/unpopulated CPU sockets). See docs for how to create it.
      # - /opt/perfsonar-tp/conf/node_exporter.defaults:/etc/default/node_exporter:z
    pids_limit: 8192
    cap_add:
      - CAP_NET_RAW
      - CAP_SYS_ADMIN
      - CAP_SYS_PTRACE
    healthcheck:
      # Validates the full pScheduler service stack (Ticker, Scheduler, Runner,
      # Archiver) without running time-consuming measurement tests (~1 second).
      test: ["CMD-SHELL", "pscheduler troubleshoot --quick || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s
